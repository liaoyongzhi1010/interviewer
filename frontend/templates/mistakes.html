{% extends "base_user.html" %}

{% block title %}错题集管理 - 夜莺面试官{% endblock %}

{% block content %}
<div class="container-fluid px-4 mistakes-page">
    <div class="mistakes-header">
        <h2 class="mistakes-title">
            <i class="fas fa-bookmark me-2"></i>错题集管理
        </h2>
        <p class="mistakes-subtitle mb-0">收藏面试题目，持续复习和标记掌握状态。</p>
    </div>

    <div class="mistakes-filters card">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label">状态</label>
                <select id="statusFilter" class="form-select">
                    <option value="">全部</option>
                    <option value="new">新收藏</option>
                    <option value="reviewing">复习中</option>
                    <option value="mastered">已掌握</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">分类</label>
                <select id="categoryFilter" class="form-select">
                    <option value="">全部分类</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">关键词</label>
                <input id="keywordFilter" type="text" class="form-control" placeholder="搜索题目关键字">
            </div>
            <div class="col-md-2 d-grid">
                <button id="searchBtn" class="btn btn-primary">
                    <i class="fas fa-search me-1"></i>筛选
                </button>
            </div>
        </div>
    </div>

    <div class="row g-3 mt-1 mb-2">
        <div class="col-md-3 col-6">
            <div class="mistake-stat-card">
                <div class="mistake-stat-value" id="statTotal">0</div>
                <div class="mistake-stat-label">收藏总数</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="mistake-stat-card">
                <div class="mistake-stat-value" id="statNew">0</div>
                <div class="mistake-stat-label">新收藏</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="mistake-stat-card">
                <div class="mistake-stat-value" id="statReviewing">0</div>
                <div class="mistake-stat-label">复习中</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="mistake-stat-card">
                <div class="mistake-stat-value" id="statMasteredRate">0%</div>
                <div class="mistake-stat-label">掌握率</div>
            </div>
        </div>
    </div>

    <div id="mistakeList" class="row g-3 mb-4"></div>
</div>

<style>
    .mistakes-page {
        margin-top: 24px;
    }

    .mistakes-header {
        margin-bottom: 1rem;
    }

    .mistakes-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 0.3rem;
    }

    .mistakes-subtitle {
        color: #64748b;
    }

    .mistakes-filters {
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        padding: 0.9rem;
        margin-bottom: 0.75rem;
    }

    .mistake-stat-card {
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: #fff;
        padding: 0.9rem;
        text-align: center;
    }

    .mistake-stat-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: #1d4ed8;
    }

    .mistake-stat-label {
        margin-top: 0.22rem;
        color: #64748b;
        font-size: 0.86rem;
    }

    .mistake-card {
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: #fff;
        height: 100%;
        padding: 0.9rem;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
    }

    .mistake-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
    }

    .mistake-badges {
        display: inline-flex;
        align-items: center;
        gap: 0.38rem;
        flex-wrap: wrap;
    }

    .mistake-badge {
        border-radius: 999px;
        border: 1px solid rgba(79, 70, 229, 0.2);
        background: rgba(224, 231, 255, 0.72);
        color: #312e81;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.22rem 0.56rem;
    }

    .mistake-badge.status-new {
        border-color: rgba(59, 130, 246, 0.25);
        background: rgba(59, 130, 246, 0.12);
        color: #1d4ed8;
    }

    .mistake-badge.status-reviewing {
        border-color: rgba(245, 158, 11, 0.3);
        background: rgba(251, 191, 36, 0.16);
        color: #b45309;
    }

    .mistake-badge.status-mastered {
        border-color: rgba(16, 185, 129, 0.3);
        background: rgba(16, 185, 129, 0.16);
        color: #047857;
    }

    .mistake-question {
        margin: 0;
        color: #0f172a;
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.52;
    }

    .mistake-answer {
        margin: 0;
        color: #475569;
        font-size: 0.9rem;
        line-height: 1.58;
        min-height: 44px;
    }

    .mistake-meta {
        color: #64748b;
        font-size: 0.82rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.45rem;
        flex-wrap: wrap;
    }

    .mistake-actions {
        display: flex;
        align-items: center;
        gap: 0.38rem;
        flex-wrap: wrap;
    }

    .mistake-actions .btn {
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.32rem 0.58rem;
    }

    .mistake-empty {
        border-radius: 12px;
        border: 1px dashed rgba(148, 163, 184, 0.35);
        color: #64748b;
        text-align: center;
        padding: 2rem 1rem;
        background: rgba(248, 250, 252, 0.8);
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
function showToast(type, message) {
    if (window.YeyingInterviewer && window.YeyingInterviewer.showToast) {
        window.YeyingInterviewer.showToast(type, message);
        return;
    }
    console.log(`[${type}] ${message}`);
}

function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function statusLabel(status) {
    if (status === 'mastered') return '已掌握';
    if (status === 'reviewing') return '复习中';
    return '新收藏';
}

function formatTime(value) {
    if (!value) return '-';
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return String(value);
    return d.toLocaleString('zh-CN');
}

function buildQuery() {
    const status = (document.getElementById('statusFilter').value || '').trim();
    const category = (document.getElementById('categoryFilter').value || '').trim();
    const keyword = (document.getElementById('keywordFilter').value || '').trim();
    const params = new URLSearchParams();
    if (status) params.set('status', status);
    if (category) params.set('category', category);
    if (keyword) params.set('keyword', keyword);
    const query = params.toString();
    return query ? `?${query}` : '';
}

function renderStats(stats) {
    const statusCounts = stats?.status_counts || {};
    document.getElementById('statTotal').textContent = String(stats?.total || 0);
    document.getElementById('statNew').textContent = String(statusCounts.new || 0);
    document.getElementById('statReviewing').textContent = String(statusCounts.reviewing || 0);
    document.getElementById('statMasteredRate').textContent = `${stats?.mastered_rate || 0}%`;
}

function renderCategoryOptions(stats) {
    const categorySelect = document.getElementById('categoryFilter');
    const selected = categorySelect.value;
    const counts = stats?.category_counts || {};

    const options = ['<option value="">全部分类</option>'];
    Object.keys(counts).sort().forEach((key) => {
        options.push(`<option value="${escapeHtml(key)}">${escapeHtml(key)} (${counts[key]})</option>`);
    });

    categorySelect.innerHTML = options.join('');
    if (selected && counts[selected] !== undefined) {
        categorySelect.value = selected;
    }
}

function renderList(items) {
    const list = document.getElementById('mistakeList');
    if (!Array.isArray(items) || items.length === 0) {
        list.innerHTML = `
            <div class="col-12">
                <div class="mistake-empty">
                    <i class="fas fa-bookmark mb-2" style="font-size: 2rem; opacity: 0.4;"></i>
                    <div>还没有收藏题目，去面试会话里收藏后会显示在这里。</div>
                </div>
            </div>
        `;
        return;
    }

    list.innerHTML = items.map((item) => {
        const category = item.question_category || '未分类';
        const status = item.status || 'new';
        const answer = item.answer_text || '暂无回答内容';
        const answerScore = item.answer_score === null || item.answer_score === undefined ? '-' : `${item.answer_score} 分`;
        return `
            <div class="col-12 col-lg-6">
                <div class="mistake-card">
                    <div class="mistake-card-head">
                        <div class="mistake-badges">
                            <span class="mistake-badge">${escapeHtml(category)}</span>
                            <span class="mistake-badge status-${escapeHtml(status)}">${statusLabel(status)}</span>
                        </div>
                        <span class="text-muted small">${answerScore}</span>
                    </div>
                    <p class="mistake-question">${escapeHtml(item.question_text || '')}</p>
                    <p class="mistake-answer">${escapeHtml(answer).slice(0, 180)}</p>
                    <div class="mistake-meta">
                        <span>会话：${escapeHtml(item.session_name || item.session_id || '-')}</span>
                        <span>收藏于：${escapeHtml(formatTime(item.created_at))}</span>
                    </div>
                    <div class="mistake-actions">
                        <button type="button" class="btn btn-outline-secondary" data-action="review" data-id="${item.id}">
                            <i class="fas fa-redo me-1"></i>复习+1
                        </button>
                        <button type="button" class="btn btn-outline-success" data-action="mastered" data-id="${item.id}">
                            <i class="fas fa-check me-1"></i>标记掌握
                        </button>
                        <button type="button" class="btn btn-outline-danger" data-action="remove" data-qa-id="${item.qa_id}">
                            <i class="fas fa-bookmark-slash me-1"></i>取消收藏
                        </button>
                        <a class="btn btn-outline-primary" href="/session/${item.session_id}">
                            <i class="fas fa-up-right-from-square me-1"></i>查看原会话
                        </a>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

async function loadMistakes() {
    const list = document.getElementById('mistakeList');
    list.innerHTML = '<div class="col-12"><div class="mistake-empty">正在加载错题数据...</div></div>';

    try {
        const response = await fetch(`/api/v1/mistakes${buildQuery()}`);
        const data = await response.json();
        if (!response.ok || !data.success || !data.data) {
            showToast('error', data.message || '加载错题失败');
            list.innerHTML = '<div class="col-12"><div class="mistake-empty">加载失败，请刷新重试。</div></div>';
            return;
        }

        renderStats(data.data.stats || {});
        renderCategoryOptions(data.data.stats || {});
        renderList(data.data.items || []);
    } catch (error) {
        showToast('error', '加载错题失败');
        list.innerHTML = '<div class="col-12"><div class="mistake-empty">加载失败，请刷新重试。</div></div>';
    }
}

async function patchMistakeStatus(itemId, status) {
    const response = await fetch(`/api/v1/mistakes/${itemId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
    });
    const data = await response.json();
    if (!response.ok || !data.success) {
        throw new Error(data.message || '更新失败');
    }
}

async function recordReview(itemId) {
    const response = await fetch(`/api/v1/mistakes/${itemId}/review`, { method: 'POST' });
    const data = await response.json();
    if (!response.ok || !data.success) {
        throw new Error(data.message || '记录复习失败');
    }
}

async function removeFavoriteByQa(qaId) {
    const response = await fetch(`/api/v1/mistakes/favorite/${qaId}`, { method: 'DELETE' });
    const data = await response.json();
    if (!response.ok || !data.success) {
        throw new Error(data.message || '取消收藏失败');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('searchBtn').addEventListener('click', loadMistakes);
    document.getElementById('statusFilter').addEventListener('change', loadMistakes);
    document.getElementById('categoryFilter').addEventListener('change', loadMistakes);
    document.getElementById('keywordFilter').addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            loadMistakes();
        }
    });

    document.getElementById('mistakeList').addEventListener('click', async function(event) {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const action = button.dataset.action;
        button.disabled = true;
        try {
            if (action === 'mastered') {
                await patchMistakeStatus(button.dataset.id, 'mastered');
                showToast('success', '已标记为掌握');
            } else if (action === 'review') {
                await recordReview(button.dataset.id);
                showToast('success', '已记录复习');
            } else if (action === 'remove') {
                await removeFavoriteByQa(button.dataset.qaId);
                showToast('success', '已取消收藏');
            }
            await loadMistakes();
        } catch (error) {
            showToast('error', error.message || '操作失败');
        } finally {
            button.disabled = false;
        }
    });

    loadMistakes();
});
</script>
{% endblock %}
